[env:adafruit_feather_esp32s2_tft]
platform = espressif32@6.12.0
board = adafruit_feather_esp32s2_tft
framework = arduino
monitor_speed = 115200
; Resident headers use std::optional (C++17). arduino-espressif32 6.12
; defaults to gnu++11, so override.
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -DARDUINO_USB_CDC_ON_BOOT=1

; Auto-reset into the ROM bootloader for upload. The ESP32-S2 has native USB
; (no USB-to-serial bridge), so the classic DTR/RTS auto-reset doesn't apply.
; Instead esptool opens the port at 1200 baud — the running firmware (with
; USB-CDC-on-boot) sees that as the "reboot to bootloader" signal. Works for
; every upload after the first; the very first flash (or any flash after
; CircuitPython, or after a sketch that breaks USB-CDC) still needs the
; BOOT + RESET button dance because no Arduino firmware is running yet.
board_upload.use_1200bps_touch = true
board_upload.wait_for_upload_port = true

; Resident + Lua + ST7789 + a canvas + WiFi stack push past the default 4MB
; layout's app slice. Custom partition table: 2.5 MB app + 1.4 MB SPIFFS.
board_build.partitions = partitions.csv

; Adafruit BusIO (transitive via LC709203F + ST7789) `#include`s SPI.h
; without declaring SPI cleanly. Deep LDF walks transitive deps so SPI
; from the arduino-esp32 framework resolves.
lib_ldf_mode = deep
lib_deps =
    ; Resident: symlink to in-tree source. CI has no SSH key for this private repo.
    symlink://../../..
    ; PIO quirk: symlinking a parent that contains this project suppresses
    ; PIO's auto-scan of our own lib/, so lib/drivers/FeatherTFTDrivers
    ; vanishes. Re-add it explicitly.
    symlink://lib/drivers
    git+https://github.com/inanimate-tech/courier.git
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.4.2
    ropg/ezTime@^0.8.3
    fischer-simon/Esp32Lua@^5.4.7
    adafruit/Adafruit NeoPixel@^1.12.0
    adafruit/Adafruit LC709203F@^1.3.4
    adafruit/Adafruit ST7735 and ST7789 Library@^1.11.0
    adafruit/Adafruit GFX Library@^1.11.10
    ; Same PIO quirk as above: with `symlink://...`, LDF's auto-resolution
    ; of Adafruit BusIO (transitive via LC709203F + ST7789) breaks.
    adafruit/Adafruit BusIO@^1.17.0
