[env:adafruit_feather_esp32s2_tft]
platform = espressif32@6.12.0
board = adafruit_feather_esp32s2_tft
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1

; Auto-reset into the ROM bootloader for upload. The ESP32-S2 has native USB
; (no USB-to-serial bridge), so the classic DTR/RTS auto-reset doesn't apply.
; Instead esptool opens the port at 1200 baud — the running firmware (with
; USB-CDC-on-boot) sees that as the "reboot to bootloader" signal. Works for
; every upload after the first; the very first flash (or any flash after
; CircuitPython, or after a sketch that breaks USB-CDC) still needs the
; BOOT + RESET button dance because no Arduino firmware is running yet.
board_upload.use_1200bps_touch = true
board_upload.wait_for_upload_port = true

; Adafruit BusIO (transitive via LC709203F) `#include`s SPI.h without
; declaring SPI cleanly in its lib metadata, so PIO's default chain LDF
; can't find it. Deep mode walks transitive deps and resolves SPI from the
; arduino-esp32 framework.
lib_ldf_mode = deep
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
    adafruit/Adafruit LC709203F@^1.3.4
    adafruit/Adafruit ST7735 and ST7789 Library@^1.11.0
    adafruit/Adafruit GFX Library@^1.11.10
