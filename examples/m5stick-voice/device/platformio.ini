[platformio]
default_envs = m5stick

[env]
platform = espressif32@6.12.0
framework = arduino
lib_deps =
    ; resident: symlink to in-tree source (repo root, three levels up).
    symlink://../../..
    ; Shared drivers live in the m5stick-demo example — reuse them here rather
    ; than keeping a second copy.
    symlink://../../m5stick-demo/device/lib/drivers
    git+https://github.com/inanimate-tech/courier.git
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.4.2
    ropg/ezTime@^0.8.3
    fischer-simon/Esp32Lua@^5.4.7
    m5stack/M5Unified
monitor_speed = 115200
; Resident headers use std::optional (C++17). arduino-espressif32 6.12
; defaults to gnu++11, so override at the env level.
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -DBOARD_HAS_PSRAM

[env:m5stick]
board = m5stick-c
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
board_build.partitions = partitions.csv
board_build.flash_mode = qio
board_build.f_flash = 80000000L
build_flags =
    ${env.build_flags}
    -DBOARD_M5STICK_C_PLUS2

[env:m5sticks3]
board = esp32-s3-devkitc-1
board_build.flash_size = 8MB
board_build.arduino.memory_type = qio_opi
lib_deps =
    ${env.lib_deps}
    M5PM1=https://github.com/m5stack/M5PM1
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_M5STICKS3
