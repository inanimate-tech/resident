[platformio]
default_envs = m5sticks3

[env:m5sticks3]
platform = espressif32@6.12.0
framework = arduino
board = esp32-s3-devkitc-1
board_build.flash_size = 8MB
board_build.arduino.memory_type = qio_opi
monitor_speed = 115200
lib_deps =
    ; resident: symlink to in-tree source (repo root, three levels up).
    symlink://../../..
    ; PIO quirk: symlinking a parent that contains this project suppresses PIO's
    ; auto-scan of our own lib/, so re-add local libs explicitly.
    symlink://lib/vision
    ; shared M5Stick drivers (display/imu/buzzer/buttons) live in m5stick-demo.
    symlink://../../m5stick-demo/device/lib/drivers
    git+https://github.com/inanimate-tech/courier.git
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.4.2
    ropg/ezTime@^0.8.3
    fischer-simon/Esp32Lua@^5.4.7
    m5stack/M5Unified
    M5PM1=https://github.com/m5stack/M5PM1
    seeed-studio/Seeed_Arduino_SSCMA@^1.0
; Resident headers use std::optional (C++17). arduino-espressif32 6.12
; defaults to gnu++11, so override.
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_M5STICKS3

; Native unit tests for the pure vision_frame helper.
; The test includes vision_frame.h by relative path, so no lib_deps are needed
; and the SSCMA-dependent driver code is never compiled natively.
[env:native]
platform = native
test_framework = unity
build_flags = -std=gnu++17
; The driver sources include Arduino/SSCMA headers and cannot compile natively.
; The test includes vision_frame.h directly by relative path — no lib needed.
lib_ignore = GroveVisionDriver
