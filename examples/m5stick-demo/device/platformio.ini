[platformio]
default_envs = m5stick

[env]
platform = espressif32@6.12.0
framework = arduino
lib_deps =
    ; outrun: symlink to in-tree source. CI has no SSH key for this private repo.
    symlink://../../..
    ; PIO quirk: symlinking a parent that contains this project suppresses PIO's
    ; auto-scan of our own lib/, so lib/drivers/M5StickDrivers vanishes. Re-add it.
    symlink://lib/drivers
    git+https://github.com/inanimate-tech/courier.git
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.4.2
    ropg/ezTime@^0.8.3
    fischer-simon/Esp32Lua@^5.4.7
    m5stack/M5Unified
monitor_speed = 115200
build_unflags =
    -std=gnu++11
build_flags =
    -std=gnu++17
    -DBOARD_HAS_PSRAM

[env:m5stick]
board = m5stick-c
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
board_build.partitions = partitions.csv
board_build.flash_mode = qio
board_build.f_flash = 80000000L

[env:m5sticks3]
board = esp32-s3-devkitc-1
board_build.flash_size = 8MB
board_build.arduino.memory_type = qio_opi
lib_deps =
    ${env.lib_deps}
    M5PM1=https://github.com/m5stack/M5PM1
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
