[env:native]
platform = native
test_framework = unity
# lib_compat_mode + -Iinclude: Esp32Lua declares "platforms": "espressif32"
# but contains plain Lua 5.4 C sources; Arduino.h/Print.h stubs in include/
# satisfy its C++ wrapper's unconditional Arduino includes.
lib_compat_mode = off
build_flags =
    -std=gnu++17
    -Wall
    -Iinclude
    # -I../../src: expose Resident src/ headers to native test builds
    -I../../src
lib_deps =
    fischer-simon/Esp32Lua@^5.4.7
