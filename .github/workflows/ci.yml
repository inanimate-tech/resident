name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck
      - name: Run static analysis
        run: ./tools/run-tests.py static-analysis

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv and PlatformIO
        run: pip install uv platformio
      - name: Run unit tests
        run: ./tools/run-tests.py unit

  build-platformio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv and PlatformIO
        run: pip install uv platformio
      - name: Build PlatformIO m5stick-demo
        run: ./tools/run-tests.py build

  build-espidf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Esp32Lua (not on ESP component registry)
        run: ./examples/espidf-basic/tools/fetch-deps.sh
      - name: Build espidf-basic example
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.3
          target: esp32
          path: examples/espidf-basic
