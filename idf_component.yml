version: "0.5.1-dev"
description: "Sandbox with hardware IO and hot reload for ESP32 devices"
url: "https://github.com/inanimate-tech/resident"

dependencies:
  idf:
    version: ">=5.0.0"
  espressif/arduino-esp32:
    version: "^3.0.0"
  # Courier 0.4.1 adds per-transport endpoint state + Client::reconnect();
  # Resident's Device sets the WS endpoint via _ws.setEndpoint() inside
  # onTransportsWillConnect(), which requires that surface.
  inanimate/courier:
    version: "^0.4.1"
  bblanchon/arduinojson:
    version: "^7.0.0"
  # Esp32Lua is not on the ESP component registry. Consumers must provide it
  # as a local component named `Esp32Lua` (e.g. via a fetch script that clones
  # https://github.com/Fischer-Simon/Esp32Lua and writes a CMakeLists.txt).
  # See examples/espidf-basic/tools/fetch-deps.sh for the canonical pattern.
files:
  # compote does not read .gitignore — we must explicitly exclude build
  # artifacts and dev-only files, or they end up in the published tarball.
  exclude:
    - "**/.pio/**/*"
    - "**/node_modules/**/*"
    - "**/managed_components/**/*"
    - "**/build/**/*"
    - "dist/**/*"
    - "examples/**/*"
    - "device-apps/**/*"
    - ".claude/**/*"
    - ".github/**/*"
    - ".vscode/**/*"
    - "docs/superpowers/**/*"
    - "tools/**/*"
    - "test/**/*"
    - "**/.DS_Store"
    - "**/package-lock.json"
    - "**/sdkconfig"
    - "**/sdkconfig.*"
    - "**/dependencies.lock"
    - "CLAUDE.md"
    - "docs/publishing.md"
    - "docs/changelog.md"
    - "docs/start-building.md"
    - "docs/migration-0.4-to-0.5.md"
    - ".gitignore"
